name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  # Required for SLSA build provenance attestations.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag, crate versions, and changelog agree
        run: scripts/qa/verify_release_version.sh

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for aarch64-linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} --bin cargo-context --bin cargo-context-mcp
          else
            cargo build --release --locked --target ${{ matrix.target }} --bin cargo-context --bin cargo-context-mcp
          fi

      - name: Package archive
        id: package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="cargo-context-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp README.md LICENSE "$STAGE/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/cargo-context.exe" "$STAGE/"
            cp "target/${{ matrix.target }}/release/cargo-context-mcp.exe" "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE"
            echo "asset=${STAGE}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/cargo-context" "$STAGE/"
            cp "target/${{ matrix.target }}/release/cargo-context-mcp" "$STAGE/"
            tar czf "${STAGE}.tar.gz" "$STAGE"
            echo "asset=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      # SLSA v1 build provenance — anyone can verify the binary came from
      # this repo + this workflow + this commit:
      #   gh attestation verify <archive> --owner asmuelle
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.asset }}

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.package.outputs.asset }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  verify-github-release:
    name: verify GitHub release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Verify release assets are attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          count="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets | length')"
          if [ "$count" -lt 5 ]; then
            echo "expected at least 5 release assets for $GITHUB_REF_NAME, found $count" >&2
            exit 1
          fi
          echo "GitHub release $GITHUB_REF_NAME has $count asset(s)." >> "$GITHUB_STEP_SUMMARY"

  # Publish the four workspace crates to crates.io in dependency order.
  # Gated on tag pushes only so a manual `workflow_dispatch` run can still
  # produce GitHub-release artifacts without touching the registry.
  #
  # Order matters: `cargo publish` strips path deps and validates the
  # declared `version` against the live crates.io index. Publishing
  # cargo-context-core first and waiting for the index to catch up keeps
  # the three dependent crates from failing the publish-time lookup.
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate, build, verify-github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          crate_published() {
            local crate="$1"
            curl -fsSL "https://crates.io/api/v1/crates/${crate}" \
              | jq -e --arg version "$version" '.versions[] | select(.num == $version)' >/dev/null
          }

          publish_if_missing() {
            local crate="$1"
            if crate_published "$crate"; then
              echo "$crate $version is already published; skipping."
              return 0
            fi
            cargo publish -p "$crate" --locked --dry-run
            cargo publish -p "$crate" --locked
          }

          wait_for_crate() {
            local crate="$1"
            for attempt in {1..20}; do
              if crate_published "$crate"; then
                echo "$crate $version is visible on crates.io."
                return 0
              fi
              echo "waiting for $crate $version to appear on crates.io (attempt $attempt/20)"
              sleep 15
            done
            echo "$crate $version did not appear on crates.io in time" >&2
            return 1
          }

          publish_if_missing cargo-context-core
          wait_for_crate cargo-context-core

          publish_if_missing cargo-context-scrub
          wait_for_crate cargo-context-scrub

          publish_if_missing cargo-context-cli
          wait_for_crate cargo-context-cli

          publish_if_missing cargo-context-mcp
          wait_for_crate cargo-context-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Release summary
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "## crates.io publish"
            echo ""
            echo "Published or verified version \`$version\` for:"
            echo "- cargo-context-core"
            echo "- cargo-context-scrub"
            echo "- cargo-context-cli"
            echo "- cargo-context-mcp"
          } >> "$GITHUB_STEP_SUMMARY"
