name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  # Required for SLSA build provenance attestations.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for aarch64-linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} --bin cargo-context --bin cargo-context-mcp
          else
            cargo build --release --locked --target ${{ matrix.target }} --bin cargo-context --bin cargo-context-mcp
          fi

      - name: Package archive
        id: package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="cargo-context-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp README.md LICENSE "$STAGE/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/cargo-context.exe" "$STAGE/"
            cp "target/${{ matrix.target }}/release/cargo-context-mcp.exe" "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE"
            echo "asset=${STAGE}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/cargo-context" "$STAGE/"
            cp "target/${{ matrix.target }}/release/cargo-context-mcp" "$STAGE/"
            tar czf "${STAGE}.tar.gz" "$STAGE"
            echo "asset=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      # SLSA v1 build provenance — anyone can verify the binary came from
      # this repo + this workflow + this commit:
      #   gh attestation verify <archive> --owner asmuelle
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.asset }}

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.package.outputs.asset }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  # Publish the four workspace crates to crates.io in dependency order.
  # Gated on tag pushes only so a manual `workflow_dispatch` run can still
  # produce GitHub-release artifacts without touching the registry.
  #
  # Order matters: `cargo publish` strips path deps and validates the
  # declared `version` against the live crates.io index. Publishing
  # cargo-context-core first and waiting for the index to catch up keeps
  # the three dependent crates from failing the publish-time lookup.
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish cargo-context-core
        run: cargo publish -p cargo-context-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Index propagation: the dependents below pin cargo-context-core by
      # version, so crates.io must see the new core release before their
      # publish step runs. ~30s is the de-facto Rust-ecosystem wait.
      - name: Wait for crates.io index to propagate core
        run: sleep 30

      - name: Publish cargo-context-scrub
        run: cargo publish -p cargo-context-scrub --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish cargo-context-cli
        run: cargo publish -p cargo-context-cli --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish cargo-context-mcp
        run: cargo publish -p cargo-context-mcp --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
